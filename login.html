<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Auth</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background-image: url("assets/lawbrigdge.jpg");
    /*background: #042665; */
    background-repeat: no-repeat;
    background-position: top center;
    background-size: cover;
    height:60vh;
    display:flex;
    align-items:center;
    justify-content:center;
    
}

.card-auth{
    width:400px;
    overflow:hidden;
}

.form-container{
    transition:transform .5s ease;
    width:200%;
    display:flex;
}

.form-box{
    width:50%;
    padding:30px;

}

</style>

</head>
<body>

<div class="card shadow-lg card-auth">

<div class="form-container" id="formContainer">


<div class="form-box">

<h3 class="mb-4 text-center">Login</h3>

<form>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" placeholder="email@email.com">
</div>

<div class="mb-3">
<label>Senha</label>
<input type="password" class="form-control" placeholder="senha">
</div>

<button class="btn btn-primary w-100" style="background: #042665;">
Entrar
</button>

</form>

<div class="text-center mt-3">
<a href="#" onclick="showRegister()">Criar conta</a>
</div>

</div>



<div class="form-box">

<h3 class="mb-4 text-center">Registrar</h3>

<form>

<div class="mb-3">
<label>Nome</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control">
</div>

<div class="mb-3">
<label>Senha</label>
<input type="password" class="form-control">
</div>

<button class="btn btn-success w-100">
Registrar
</button>

</form>

<div class="text-center mt-3">
<a href="#" onclick="showLogin()">Voltar para login</a>
</div>

</div>

</div>
</div>


<script>

function showRegister(){
    document.getElementById("formContainer").style.transform="translateX(-50%)"
}

function showLogin(){
    document.getElementById("formContainer").style.transform="translateX(0)"
}

</script>

</body>
</html>
